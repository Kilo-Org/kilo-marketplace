# Kilo Stack Catalog — source of truth for technology → resource associations.
#
# This file is Kilo-curated. The generator (bin/generate-stack-catalog.ts) validates
# all resource IDs against the mcps/ and skills/ inventories, enforces the trust policy,
# auto-fills association metadata (trust/maturity/source/warnings/rationale) from the
# resources registry, stamps curated:true, and writes stack/marketplace.json.
#
# Each technology association only requires:
#   - ref:     qualified resource ref (skill:id or mcp:id)
#   - default: true if enabled by default, false otherwise
#   - rationale: (optional) custom override — auto-generated if omitted
#
# Revision format: YYYY-MM-DD.N where N starts at 1 and increments each same-day update.

