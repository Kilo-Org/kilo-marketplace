id: gcp-pubsub
name: Google Cloud Pub/Sub Remote MCP
description: Manages Pub/Sub topics, subscriptions, and messages through Google's hosted MCP endpoint using Google OAuth and Pub/Sub IAM permissions.
author: Google Cloud
url: https://docs.cloud.google.com/pubsub/docs/use-pubsub-mcp
category: data
prerequisites:
  - Google Cloud project with the Pub/Sub API enabled
  - Google identity with the intended Pub/Sub IAM roles
content:
  - name: Google hosted remote server
    content: |
      {
        "type": "streamable-http",
        "url": "https://pubsub.googleapis.com/mcp"
      }
